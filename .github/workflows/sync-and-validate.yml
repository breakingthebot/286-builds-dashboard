name: Sync and Validate Builds

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync builds.json
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync builds.json from 286-builds
        run: python3 scripts/sync-builds.py

      - name: Commit updated data if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/builds.json data/stats.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync builds.json from 286-builds [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate metadata
    runs-on: ubuntu-latest
    needs: sync

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull any commits pushed by the sync job
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate builds metadata
        run: python3 scripts/validate-metadata.py data/builds.json

  verify-links:
    name: Verify build repo links
    runs-on: ubuntu-latest
    needs: sync
    # Run link checks on schedule or manual trigger; skip on regular pushes
    # to avoid slow link checking on every commit.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify all repo links
        run: python3 scripts/verify-links.py data/builds.json
